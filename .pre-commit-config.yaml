repos:
  - repo: local
    hooks:
      - id: cargo-test
        name: cargo test (base)
        entry: bash -lc 'cargo test --locked'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: cargo-test-set
        name: cargo test (set feature)
        entry: bash -lc 'cargo test --locked --features set'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: cargo-test-stack
        name: cargo test (stack feature)
        entry: bash -lc 'cargo test --locked --features stack'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: codegen-check
        name: codegen check
        entry: cargo run -p codegen -- check
        language: system
        pass_filenames: false

      - id: python-scripts-compile-check
        name: python scripts compile check
        entry: python3 -m compileall -q .github/scripts
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
